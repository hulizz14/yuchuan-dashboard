<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>禹川集团综合看板</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
html { font-size: 14px; }
@media (max-width: 360px) { html { font-size: 12px; } }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; }

/* 侧边栏 */
.sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100vh; background: #1e293b; color: #fff; overflow-y: auto; transition: left 0.3s; z-index: 100; }
.sidebar.open { left: 0; }
.nav-item { display: block; padding: 0.875rem 1rem; border-bottom: 1px solid #334155; cursor: pointer; }
.nav-item:hover, .nav-item.active { background: #3b82f6; }

/* 主内容 */
.main { min-height: 100vh; }
.header { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); color: #fff; padding: 0.875rem; position: sticky; top: 0; z-index: 50; }
.menu-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 0.5rem; border-radius: 0.375rem; cursor: pointer; }

/* iframe容器 */
.iframe-container { width: 100%; height: calc(100vh - 60px); border: none; }

/* 遮罩 */
.overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99; display: none; }
.overlay.show { display: block; }

/* 页面切换 */
.page { display: none; }
.page.active { display: block; }
</style>
</head>
<body class="bg-slate-100">

<!-- 侧边栏 -->
<div class="sidebar" id="sidebar">
<div class="p-4 bg-gradient-to-r from-blue-900 to-blue-700">
<div class="text-lg font-bold">🏢 禹川集团</div>
<div class="text-xs opacity-80">综合看板 · 资产+部门工作</div>
</div>

<div class="px-4 py-2 text-xs text-slate-400 border-b border-slate-700">📈 资产看板</div>
<div class="nav-item active" onclick="showPage('welcome')">📊 欢迎页</div>
<div class="nav-item" onclick="showPage('caifu')">🏢 财富中心</div>
<div class="nav-item" onclick="showPage('tianyu')">🏘️ 天屿花城</div>
<div class="nav-item" onclick="showPage('chengben')">💰 成本数据</div>

<div class="px-4 py-2 text-xs text-slate-400 border-b border-slate-700 mt-2">📋 部门工作</div>
<div class="nav-item" onclick="showPage('gongcheng')">🔧 工程部</div>
<div class="nav-item" onclick="showPage('wuye')">🛠️ 物业公司</div>
<div class="nav-item" onclick="showPage('fawu')">⚖️ 法务部</div>
<div class="nav-item" onclick="showPage('chengbenbumen')">📊 成本部</div>
<div class="nav-item" onclick="showPage('kaifa')">🏗️ 开发部</div>
<div class="nav-item" onclick="showPage('caiwu')">💰 财务部</div>
<div class="nav-item" onclick="showPage('renli')">👥 人力行政部</div>
</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="main">
<!-- Header -->
<header class="header flex justify-between items-center">
<button class="menu-btn" onclick="toggleSidebar()">☰</button>
<div>
<div class="font-bold text-sm">禹川集团综合看板</div>
<div class="text-xs opacity-80">2026-03-07</div>
</div>
<div class="w-8"></div>
</header>

<!-- 欢迎页 -->
<div class="page active" id="page-welcome">
<div class="p-4">
<div class="bg-white rounded-xl p-6 shadow-sm text-center">
<div class="text-5xl mb-4">🏢</div>
<h2 class="text-xl font-bold text-slate-800 mb-2">欢迎使用禹川集团综合看板</h2>
<p class="text-slate-500 text-sm mb-6">请点击左上角 ☰ 菜单查看资产看板或部门工作计划</p>

<div class="grid grid-cols-2 gap-3">
<div class="bg-blue-50 p-4 rounded-xl">
<div class="text-2xl mb-1">🏢</div>
<div class="text-xs text-slate-500">资产看板</div>
<div class="text-lg font-bold text-blue-600">4个</div>
</div>
<div class="bg-green-50 p-4 rounded-xl">
<div class="text-2xl mb-1">📋</div>
<div class="text-xs text-slate-500">部门看板</div>
<div class="text-lg font-bold text-green-600">7个</div>
</div>
</div>
</div>
</div>
</div>

<!-- 财富中心 -->
<div class="page" id="page-caifu">
<iframe class="iframe-container" src="./财富中心看板_v5_分楼栋版_20260307.html"></iframe>
</div>

<!-- 天屿花城 -->
<div class="page" id="page-tianyu">
<iframe class="iframe-container" src="./天屿花城看板_v3_不含车位版_20260307.html"></iframe>
</div>

<!-- 成本数据 -->
<div class="page" id="page-chengben">
<iframe class="iframe-container" src="./禹川集团成本数据汇总看板.html"></iframe>
</div>

<!-- 部门工作 -->
<div class="page" id="page-gongcheng">
<iframe class="iframe-container" src="./工程部2026年工作计划看板_确认版.html"></iframe>
</div>
<div class="page" id="page-wuye">
<iframe class="iframe-container" src="./物业公司2026年工作计划看板_确认版.html"></iframe>
</div>
<div class="page" id="page-fawu">
<iframe class="iframe-container" src="./法务部2026年工作计划看板_确认版.html"></iframe>
</div>
<div class="page" id="page-chengbenbumen">
<iframe class="iframe-container" src="./成本部2026年工作计划看板_确认版.html"></iframe>
</div>
<div class="page" id="page-kaifa">
<iframe class="iframe-container" src="./开发部2026年工作计划看板_确认版.html"></iframe>
</div>
<div class="page" id="page-caiwu">
<iframe class="iframe-container" src="./财务部2026年工作安排看板_确认版.html"></iframe>
</div>
<div class="page" id="page-renli">
<iframe class="iframe-container" src="./人力行政部2026年工作计划看板_确认版.html"></iframe>
</div>

</div>

<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
}

function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    event.target.classList.add('active');
    toggleSidebar();
}
</script>

</body>
</html>
